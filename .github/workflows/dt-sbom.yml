---
# Upload a CycloneDX SBOM of this repo's resolved npm dependencies to the
# homelab Dependency-Track instance. This is the FOSSA replacement (fossa.yml
# stays in place until DT is proven out across the OSS repos).
#
# Two jobs, because only one of them may touch the cluster:
#   sbom   - hosted runner (UNTRUSTED): `npm ci` (which may run dependency
#            lifecycle scripts) and the SBOM generator run here, never on the
#            in-cluster runner. Emits sbom.cdx.json.
#   upload - in-cluster arc-oss-homebridge-playstation runner: exchange this run's GitHub
#            OIDC token for the Dependency-Track CI key via OpenBao
#            (vault-action), then POST the SBOM. Project identity is taken from
#            trusted GitHub context (github.repository / github.sha), NOT from
#            anything the sbom job produced, so a compromised dependency can't
#            inject values that get executed on the cluster runner. The runner is
#            egress-locked to a few in-cluster services, so OpenBao and DT are
#            addressed by their in-cluster Service DNS names, not the public
#            gateway (the LE cert has no in-cluster SAN -> tlsSkipVerify; egress
#            is identity-locked to the OpenBao pods, and pod-to-pod traffic is
#            WireGuard-encrypted). The set is REPO-scoped (one arc-oss-<repo> set
#            per OSS repo; a user account can't host shared runners). See
#            github.com/jabrown93/homelab -> docs/dependency-track.md.
#
# push-to-main + manual only: never runs on pull_request, so fork PR code can't
# reach the in-cluster runner. (PR license checks run via pr-license-check.yml,
# which keeps fork PRs off the in-cluster runner.)
name: Dependency-Track SBOM

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  sbom:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3

      - name: Set up Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate CycloneDX SBOM
        run: |
          set -euo pipefail
          npx --yes @cyclonedx/cyclonedx-npm@4.2.1 \
            --output-format JSON \
            --output-file sbom.cdx.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: sbom
          if-no-files-found: error
          path: sbom.cdx.json

  upload:
    needs: sbom
    runs-on: arc-oss-homebridge-playstation
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Download SBOM artifact
        uses: actions/download-artifact@v8.0.1
        with:
          name: sbom

      - name: Fetch DT API key from OpenBao
        id: bao
        uses: hashicorp/vault-action@v4.0.0
        with:
          url: https://openbao-active.openbao.svc.cluster.local:8200
          tlsSkipVerify: true
          method: jwt
          path: github-actions
          role: dt-sbom-upload
          jwtGithubAudience: openbao
          secrets: |
            secret/data/dependency-track/ci-api-key apiKey | DT_API_KEY

      - name: Upload SBOM to Dependency-Track
        env:
          DT_API_KEY: ${{ steps.bao.outputs.DT_API_KEY }}
          PROJECT_NAME: github.com/${{ github.repository }}
          PROJECT_VERSION: ${{ github.sha }}
        run: |
          set -euo pipefail
          curl -fsS -X POST http://dependency-track-api-server.dependency-track.svc.cluster.local:8080/api/v1/bom \
            -H "X-Api-Key: ${DT_API_KEY}" \
            -F "autoCreate=true" \
            -F "projectName=${PROJECT_NAME}" \
            -F "projectVersion=${PROJECT_VERSION}" \
            -F "isLatest=true" \
            -F "bom=@sbom.cdx.json"
